<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hedera Enterprise Agent</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --purple: #8b5cf6;
      --purple-light: #a78bfa;
      --purple-dim: #2d1f5e;
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e2f0;
      --muted: #6b6b8a;
      --user-bubble: #2d1f5e;
      --agent-bubble: #1e1e2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--purple), #6366f1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header .subtitle { font-size: 12px; color: var(--muted); margin-left: 4px; }
    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .dot.red { background: var(--red); }
    .nav-links { display: flex; gap: 8px; margin-left: 12px; }
    .nav-links a {
      font-size: 12px; color: var(--muted); text-decoration: none;
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .nav-links a:hover { color: var(--purple-light); border-color: var(--purple); }
    #chat {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .welcome { text-align: center; padding: 40px 20px; color: var(--muted); }
    .welcome .icon { font-size: 40px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; max-width: 420px; margin: 0 auto 20px; }
    .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .example-btn {
      font-size: 12px; padding: 8px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); cursor: pointer; transition: all 0.15s;
    }
    .example-btn:hover { border-color: var(--purple); color: var(--purple-light); }
    .msg { display: flex; gap: 10px; max-width: 800px; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent { align-self: flex-start; }
    .avatar {
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .msg.user .avatar { background: var(--purple-dim); }
    .msg.agent .avatar { background: var(--surface2); border: 1px solid var(--border); }
    .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; max-width: 600px; }
    .msg.user .bubble { background: var(--user-bubble); border: 1px solid #4c1d95; border-radius: 12px 4px 12px 12px; }
    .msg.agent .bubble { background: var(--agent-bubble); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; }
    .tx-section { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .tx-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .tx-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #0d2218; border: 1px solid #10b981;
      border-radius: 6px; padding: 5px 10px;
      font-size: 11px; font-family: monospace; color: var(--green);
    }
    .tx-badge a { color: var(--green); text-decoration: none; }
    .tx-badge a:hover { text-decoration: underline; }
    .tool-badge {
      display: inline-flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
      font-size: 11px; color: var(--purple-light); font-family: monospace;
      margin-right: 4px; margin-top: 2px;
    }
    .thinking {
      display: flex; gap: 4px; padding: 14px 16px;
      background: var(--agent-bubble); border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px; width: fit-content;
    }
    .thinking span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); animation: bounce 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    #input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 16px 24px; flex-shrink: 0; }
    .input-row {
      display: flex; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px 4px 4px 16px; transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--purple); }
    #msg-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; padding: 8px 0; }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--purple); border: none; border-radius: 8px;
      color: white; cursor: pointer; padding: 8px 18px; font-size: 14px; font-weight: 500; transition: background 0.15s;
    }
    #send-btn:hover { background: var(--purple-light); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
<header>
  <div class="logo">⬡</div>
  <div><h1>Hedera Enterprise Agent</h1></div>
  <span class="subtitle">Testnet</span>
  <div class="nav-links">
    <a href="/audit" target="_blank">Audit log</a>
    <a href="/docs" target="_blank">API docs</a>
  </div>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">checking…</span>
  </div>
</header>
<div id="chat">
  <div class="welcome" id="welcome">
    <div class="icon">⬡</div>
    <h2>Hedera Enterprise Agent</h2>
    <p>I can transfer HBAR, create tokens, submit KYC records to HCS, and more. All transactions are real on Hedera Testnet.</p>
    <div class="examples">
      <button class="example-btn" onclick="useExample(this)">What is my HBAR balance?</button>
      <button class="example-btn" onclick="useExample(this)">Transfer 1 HBAR to account 0.0.3</button>
      <button class="example-btn" onclick="useExample(this)">Create a token named TestCoin with symbol TC and supply 1000</button>
      <button class="example-btn" onclick="useExample(this)">Create an HCS topic for KYC records</button>
    </div>
  </div>
</div>
<div id="input-area">
  <div class="input-row">
    <input id="msg-input" type="text" placeholder="Ask the agent to transfer HBAR, create a token, submit KYC…" autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
  <div class="hint">Transactions execute on Hedera Testnet · <a href="/audit" target="_blank" style="color:var(--muted)">view audit log</a></div>
</div>
<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  let sessionId = 'session-' + Math.random().toString(36).slice(2);
  fetch('/health').then(r => r.json()).then(d => {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (d.status === 'healthy') { dot.classList.remove('red'); txt.textContent = 'Connected · ' + d.network; }
    else { dot.classList.add('red'); txt.textContent = 'Degraded'; }
  }).catch(() => { document.getElementById('status-dot').classList.add('red'); document.getElementById('status-text').textContent = 'Offline'; });
  function useExample(b) { input.value = b.textContent; input.focus(); }
  function hideWelcome() { const w = document.getElementById('welcome'); if (w) w.remove(); }
  function appendUser(text) {
    hideWelcome();
    const el = document.createElement('div'); el.className = 'msg user';
    el.innerHTML = `<div class="avatar">👤</div><div class="bubble">${escHtml(text)}</div>`;
    chat.appendChild(el); scrollDown();
  }
  function appendThinking() {
    hideWelcome();
    const el = document.createElement('div'); el.className = 'msg agent';
    el.innerHTML = `<div class="avatar">⬡</div><div class="thinking"><span></span><span></span><span></span></div>`;
    chat.appendChild(el); scrollDown(); return el;
  }
  function appendAgent(data) {
    const el = document.createElement('div'); el.className = 'msg agent';
    let toolsHtml = '';
    if (data.tools_invoked && data.tools_invoked.length) {
      toolsHtml = '<div style="margin-top:10px">' + data.tools_invoked.map(t => `<span class="tool-badge">⚙ ${escHtml(t)}</span>`).join('') + '</div>';
    }
    let txHtml = '';
    if (data.transaction_ids && data.transaction_ids.length) {
      txHtml = '<div class="tx-section"><span class="tx-label">Transaction IDs</span>' +
        data.transaction_ids.map(tx => {
          const url = `https://hashscan.io/testnet/transaction/${encodeURIComponent(tx)}`;
          return `<div class="tx-badge">✓ <a href="${url}" target="_blank">${escHtml(tx)}</a></div>`;
        }).join('') + '</div>';
    }
    el.innerHTML = `<div class="avatar">⬡</div><div class="bubble">${escHtml(data.reply)}${toolsHtml}${txHtml}</div>`;
    chat.appendChild(el); scrollDown();
  }
  function appendError(msg) {
    const el = document.createElement('div'); el.className = 'msg agent';
    el.innerHTML = `<div class="avatar">⬡</div><div class="bubble" style="border-color:#ef4444;color:#fca5a5">${escHtml(msg)}</div>`;
    chat.appendChild(el); scrollDown();
  }
  function scrollDown() { chat.scrollTop = chat.scrollHeight; }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });
  async function sendMessage() {
    const text = input.value.trim(); if (!text) return;
    input.value = ''; btn.disabled = true;
    appendUser(text);
    const thinking = appendThinking();
    try {
      const res = await fetch('/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      thinking.remove();
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        appendError('Error ' + res.status + ': ' + (err.detail || res.statusText));
      } else { appendAgent(await res.json()); }
    } catch (e) { thinking.remove(); appendError('Network error: ' + e.message); }
    finally { btn.disabled = false; input.focus(); }
  }
</script>
</body>
</html>
